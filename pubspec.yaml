name: yaya_calendar
description: "丫丫日历 - 一款支持农历、节气、节日的日历应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 数据库
  sqflite: ^2.4.1
  path: ^1.9.1

  # UUID 生成
  uuid: ^4.5.1

  # 国际化日期格式化
  intl: ^0.20.2

  # 状态管理
  provider: ^6.1.2

  # 本地存储（主题偏好）
  shared_preferences: ^2.3.4
  lunar: ^1.7.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
